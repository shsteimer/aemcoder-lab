<!DOCTYPE html>
<html>

<head>
  <meta
    http-equiv="Content-Security-Policy"
    content="script-src 'nonce-aem' 'strict-dynamic' 'unsafe-inline' http: https:; base-uri 'self'; object-src 'none';"
    move-to-http-header="true"
  >
  <title>Page not found — WKND Adventures</title>
  <script nonce="aem" type="text/javascript">
    window.isErrorPage = true;
    window.errorCode = '404';
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta property="og:title" content="Page not found — WKND Adventures">
  <script nonce="aem" src="/scripts/scripts.js" type="module"></script>
  <script nonce="aem" type="module">
    window.addEventListener('load', () => {
      if (document.referrer) {
        const { origin, pathname } = new URL(document.referrer);
        if (origin === window.location.origin) {
          const backBtn = document.createElement('a');
          backBtn.classList.add('button', 'secondary');
          backBtn.href = pathname;
          backBtn.textContent = 'Go Back';
          backBtn.title = 'Go Back';
          const group = document.querySelector('.error-actions');
          group.append(backBtn);
        }
      }
    });
  </script>
  <script nonce="aem" type="module">
    import { sampleRUM } from '/scripts/aem.js';
    sampleRUM('404', { source: document.referrer });
  </script>
  <link rel="stylesheet" href="/styles/styles.css">
  <style>
    main.error {
      min-height: calc(100vh - var(--nav-height));
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
    }

    main.error .section {
      max-width: 600px;
    }

    .error-code {
      font-family: var(--heading-font-family);
      font-size: clamp(80px, 20vw, 200px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--accent-color);
      margin: 0 0 16px;
    }

    .error-message {
      font-family: var(--heading-font-family);
      font-size: var(--heading-font-size-l);
      font-weight: 700;
      color: var(--text-color);
      margin: 0 0 12px;
    }

    .error-description {
      color: var(--text-color-muted);
      font-size: var(--body-font-size-m);
      line-height: 1.6;
      margin: 0 0 32px;
    }

    .error-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
  </style>
  <link rel="stylesheet" href="/styles/lazy-styles.css">
</head>

<body>
  <header></header>
  <main class="error">
    <div class="section">
      <p class="error-code">404</p>
      <h1 class="error-message">Trail Not Found</h1>
      <p class="error-description">The route you're looking for doesn't exist — it may have moved, or you may have taken a wrong turn. Every good adventure has a few of those.</p>
      <div class="error-actions">
        <a href="/" class="button primary">Go Home</a>
      </div>
    </div>
  </main>
  <footer></footer>
</body>

</html>
